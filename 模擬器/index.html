<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTTO AI 機器人 · 3D 模擬器</title>
<style>
:root{
  --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
  --gold:#F5A623; --gold2:#f7d98a; --text:#f3eefb; --muted:#b9a9d6;
  --card:rgba(255,255,255,.06); --line:rgba(255,255,255,.14);
  --green:#27AE60; --red:#E74C3C; --blue:#4A90D9;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Noto Sans TC',system-ui,'Microsoft JhengHei',sans-serif;color:var(--text);
  background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));overflow:hidden}
header{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--line)}
header .logo{font-size:26px}
header h1{font-size:19px;font-weight:900}
header h1 .g{color:var(--gold)}
header .sub{font-size:12.5px;color:var(--muted)}
header .right{margin-left:auto;font-size:12.5px;color:var(--muted)}
.main{display:flex;height:calc(100% - 55px)}
/* ---------- 左側程式面板 ---------- */
.panel{width:460px;min-width:380px;display:flex;flex-direction:column;border-right:1px solid var(--line);background:rgba(0,0,0,.22)}
.toolbar{display:flex;gap:8px;align-items:center;padding:10px 12px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.btn{border:none;border-radius:10px;padding:9px 18px;font-size:15px;font-weight:900;cursor:pointer;
  font-family:inherit;transition:transform .12s, box-shadow .12s}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(1px) scale(.96);box-shadow:0 0 0 3px rgba(245,166,35,.35)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn.run.running{background:linear-gradient(135deg,#27AE60,#2ECC71);color:#fff;animation:runpulse 1s ease-in-out infinite}
@keyframes runpulse{50%{filter:brightness(1.25)}}
.btn.run{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#2a1a4a}
.btn.stop{background:var(--red);color:#fff}
.btn.reset{background:rgba(255,255,255,.12);color:var(--text);border:1px solid var(--line)}
select{background:#241f45;color:var(--text);border:1px solid var(--line);border-radius:8px;
  padding:8px 10px;font-size:13.5px;font-family:inherit}
.codewrap{flex:1;position:relative;display:flex;flex-direction:column;min-height:0}
.codehead{display:flex;align-items:center;padding:7px 14px;font-size:12.5px;color:var(--muted);
  border-bottom:1px solid var(--line)}
.codehead b{color:var(--gold2);font-family:'Fira Code',Consolas,monospace}
#code{flex:1;width:100%;resize:none;border:none;outline:none;background:transparent;color:#e8e3ff;
  font-family:'Fira Code',Consolas,'Courier New',monospace;font-size:13.5px;line-height:1.65;
  padding:12px 14px;white-space:pre;tab-size:2}
#code::selection{background:rgba(245,166,35,.35)}
.splitv{width:8px;cursor:col-resize;background:rgba(255,255,255,.05);flex-shrink:0;
  border-left:1px solid var(--line);border-right:1px solid var(--line);transition:background .15s}
.splitv:hover,.splitv.on{background:var(--gold)}
.csplit{height:8px;cursor:row-resize;background:rgba(255,255,255,.05);flex-shrink:0;
  border-top:1px solid var(--line);transition:background .15s}
.csplit:hover,.csplit.on{background:var(--gold)}
.console{height:170px;min-height:70px;display:flex;flex-direction:column}
.console .chead{display:flex;align-items:center;gap:10px;padding:6px 14px;font-size:12.5px;color:var(--muted)}
.console .chead .loopn{margin-left:auto;background:rgba(39,174,96,.18);border:1px solid var(--green);
  color:#9be8bb;border-radius:12px;padding:2px 12px;font-weight:700;display:none}
#log{flex:1;overflow-y:auto;padding:4px 14px 10px;font-size:13px;line-height:1.75;
  font-family:'Fira Code',Consolas,monospace}
#log .ok{color:#cfeadb}
#log .sys{color:var(--muted)}
#log .err{color:#ff9d9d;font-weight:700}
#log .note{color:var(--gold2)}
/* ---------- 右側 3D ---------- */
.stage{flex:1;position:relative;min-width:0}
#c3d{width:100%;height:100%;display:block;cursor:grab}
#c3d:active{cursor:grabbing}
.hint{position:absolute;top:12px;left:14px;font-size:12.5px;color:var(--muted);
  background:rgba(15,12,41,.55);border:1px solid var(--line);border-radius:10px;padding:6px 12px;pointer-events:none}
.hud{position:absolute;right:14px;top:12px;width:230px;display:flex;flex-direction:column;gap:10px}
.hcard{background:rgba(15,12,41,.72);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.hcard h4{font-size:13.5px;color:var(--gold2);margin-bottom:6px}
.hcard .val{font-size:22px;font-weight:900}
.hcard .val small{font-size:12px;color:var(--muted);font-weight:400}
.hcard input[type=range]{width:100%;accent-color:var(--gold)}
.hcard label{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:8px;margin-top:4px}
.statusbar{position:absolute;left:50%;transform:translateX(-50%);bottom:16px;
  background:rgba(15,12,41,.78);border:1px solid var(--gold);border-radius:24px;
  padding:9px 26px;font-size:15px;font-weight:700;display:none;white-space:nowrap}
.statusbar .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);
  margin-right:9px;animation:blink 1s infinite}
@keyframes blink{50%{opacity:.25}}
@media(max-width:900px){.panel{width:52%;min-width:0}}
/* 🎯 任務挑戰 */
#missions{background:#14401f;color:#eafff2;border:1px solid var(--green)}
.mcard{display:none;margin:0 0 8px;background:linear-gradient(135deg,#1e3a2e,#14261d);
  border:1px solid var(--green);border-radius:14px;padding:13px 15px;color:#eafff2;position:relative}
.mcard.show{display:block}
.mcard.win{border-color:var(--gold);background:linear-gradient(135deg,#3a2f14,#2a2410);box-shadow:0 0 26px rgba(245,166,35,.4)}
.mcard.fail{border-color:#E74C3C;background:linear-gradient(135deg,#3a1e1e,#2a1414)}
.mcard h3{font-size:16px;margin:0 0 5px}
.mcard .goal{font-size:13.5px;line-height:1.6}
.mcard .goal b{color:var(--gold)}
.mcard .tip{font-size:12px;color:#9fd9b8;margin-top:6px;line-height:1.5}
.mcard .res{font-size:14px;font-weight:700;margin-top:8px;line-height:1.5}
.mcard .mx{position:absolute;top:11px;right:13px;cursor:pointer;color:#9fd9b8;font-size:12px}
.mcard .mx:hover{color:#fff}
</style>
</head>
<body>
<header>
  <span class="logo">🤖</span>
  <div>
    <h1>OTTO AI 機器人 · <span class="g">3D 模擬器</span></h1>
    <div class="sub">寫好程式 → 按「執行」→ 看 OTTO 動起來｜確認 OK 再上傳到真的機器人</div>
  </div>
  <div class="right">曾慶良 主任（阿亮老師）· Vibe Coding 實戰課</div>
</header>

<div class="main">
  <!-- 左：程式 -->
  <div class="panel">
    <div class="toolbar">
      <button class="btn run" id="btnRun">▶ 執行</button>
      <button class="btn stop" id="btnStop">⏹ 停止</button>
      <button class="btn reset" id="btnReset">⟲ 歸位</button>
      <select id="examples" title="載入範例程式">
        <option value="">📚 載入範例程式…</option>
        <option value="hello">01 · 第一次見面（開機打招呼）</option>
        <option value="walk">02 · 向前走與轉彎</option>
        <option value="dance">03 · 跳舞秀（for 迴圈）</option>
        <option value="sing">04 · 唱歌串燒</option>
        <option value="avoid">05 · 超音波避障（if 判斷）</option>
        <option value="factory">06 · 原廠避障範例（自訂函式版）</option>
      </select>
      <select id="missions" title="挑戰任務">
        <option value="">🎯 挑戰任務…</option>
        <option value="reach">🚶 走到終點（CH06）</option>
        <option value="dance">🕺 創意舞蹈家（CH09）</option>
        <option value="loop">⚡ 迴圈大師（CH11）</option>
        <option value="avoid">🛡️ 避障不撞牆（CH13）</option>
      </select>
    </div>
    <div class="mcard" id="mcard"></div>
    <div class="codewrap">
      <div class="codehead">📄 <b>&nbsp;otto_robot.ino</b>&nbsp;· 這份程式碼與真實 OTTO 完全相同，可直接複製到 Arduino IDE 上傳</div>
      <textarea id="code" spellcheck="false"></textarea>
    </div>
    <div class="csplit" id="splitH" title="上下拖曳＝調整紀錄區高度"></div>
    <div class="console">
      <div class="chead">🖥️ 執行紀錄 <span class="loopn" id="loopN">loop() 第 1 圈</span></div>
      <div id="log"></div>
    </div>
  </div>

  <div class="splitv" id="splitV" title="左右拖曳＝調整面板寬度"></div>

  <!-- 右：3D 舞台 -->
  <div class="stage">
    <canvas id="c3d"></canvas>
    <div class="hint">🖱️ 拖曳＝旋轉視角　滾輪＝縮放</div>
    <div class="hud">
      <div class="hcard">
        <h4>📡 超音波距離（眼睛看到的）</h4>
        <div class="val" id="distVal">25 <small>cm</small></div>
        <input type="range" id="distSlider" min="4" max="60" value="25">
        <label>拉動滑桿＝移動前方的障礙物</label>
      </div>
      <div class="hcard">
        <h4>🔊 蜂鳴器</h4>
        <label><input type="checkbox" id="sndChk" checked> 開啟聲音</label>
      </div>
    </div>
    <div class="statusbar" id="statusBar"><span class="dot"></span><span id="statusTxt"></span></div>
  </div>
</div>

<script src="assets/three.min.js"></script>
<script src="assets/otto-examples.js"></script>
<script>
/* =====================================================================
 *  OTTO 3D 模擬器（原型）
 *  1) 3D 場景與 OTTO 模型（照真實照片：藍頭白身、超音波眼睛、4 顆伺服）
 *  2) 動作引擎（比照 OttoDIYLib 的振盪器：offset + A·sin(ωt+φ)）
 *  3) 迷你 Arduino C++ 直譯器（setup/loop、Otto.*、delay、if、for、變數）
 * ===================================================================== */

/* ---------- 1. 場景 ---------- */
const canvas = document.getElementById('c3d');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x191538);
scene.fog = new THREE.Fog(0x191538, 70, 160);

const camera = new THREE.PerspectiveCamera(45, 2, 0.1, 500);
let camTheta = 0.5, camPhi = 1.15, camR = 34;           // 球座標視角
const camTarget = new THREE.Vector3(0, 6, 0);
function updateCamera(){
  camera.position.set(
    camTarget.x + camR * Math.sin(camPhi) * Math.sin(camTheta),
    camTarget.y + camR * Math.cos(camPhi),
    camTarget.z + camR * Math.sin(camPhi) * Math.cos(camTheta));
  camera.lookAt(camTarget);
}
updateCamera();

/* 自製軌道控制：拖曳旋轉、滾輪縮放（支援觸控） */
let dragging = false, px = 0, py = 0;
canvas.addEventListener('pointerdown', e => {dragging = true; px = e.clientX; py = e.clientY; canvas.setPointerCapture(e.pointerId);});
canvas.addEventListener('pointermove', e => {
  if(!dragging) return;
  camTheta -= (e.clientX - px) * 0.006;
  camPhi   = Math.min(1.5, Math.max(0.25, camPhi - (e.clientY - py) * 0.006));
  px = e.clientX; py = e.clientY; updateCamera();
});
canvas.addEventListener('pointerup', () => dragging = false);
canvas.addEventListener('wheel', e => {e.preventDefault();
  camR = Math.min(90, Math.max(14, camR * (e.deltaY > 0 ? 1.08 : 0.93))); updateCamera();
}, {passive:false});

/* 燈光 */
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xfff4e0, 0.9);
key.position.set(18, 30, 14);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -50;
key.shadow.camera.right = key.shadow.camera.top = 50;
scene.add(key);
const rim = new THREE.DirectionalLight(0x8a7dd8, 0.45);
rim.position.set(-14, 12, -18);
scene.add(rim);

/* 地板 + 格線 */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(300, 300),
  new THREE.MeshStandardMaterial({color:0x221d46, roughness:0.95}));
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);
const grid = new THREE.GridHelper(300, 60, 0x5a4d9e, 0x342c63);
grid.position.y = 0.02;
scene.add(grid);

/* ---------- OTTO 模型（照參考照片） ---------- */
const M = {
  blue :new THREE.MeshStandardMaterial({color:0x2f6fd0, roughness:0.55}),
  white:new THREE.MeshStandardMaterial({color:0xf2f0eb, roughness:0.6}),
  eyeRim:new THREE.MeshStandardMaterial({color:0xb8bcc4, metalness:0.85, roughness:0.3}),
  eyeIn:new THREE.MeshStandardMaterial({color:0x2b2f36, metalness:0.4, roughness:0.5}),
  dark :new THREE.MeshStandardMaterial({color:0x1d1f24, roughness:0.6}),
  servo:new THREE.MeshStandardMaterial({color:0x2255aa, roughness:0.6}),
};
function box(w,h,d,mat,x,y,z,parent){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow = true; m.receiveShadow = true;
  (parent||scene).add(m); return m;
}

const otto = new THREE.Group();          // 世界位置（走路移動、轉身用）
scene.add(otto);
const bodyG = new THREE.Group();         // 身體（跳躍、上下用）
otto.add(bodyG);

/* 身體（白）與頭（藍） */
box(6.6, 4.6, 5.4, M.white, 0, 5.5, 0, bodyG);
const head = box(7.0, 3.8, 5.8, M.blue, 0, 9.7, 0, bodyG);
/* 超音波眼睛（×2）：鋁銀色外圈 → 黑色內部；發射超音波時內部會閃紅光 */
const eyeCores = [];
for(const sx of [-1.55, 1.55]){
  const rimc = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.05, 1.0, 24), M.eyeRim);
  rimc.rotation.x = Math.PI/2; rimc.position.set(sx, -0.1, 3.0); rimc.castShadow = true;
  head.add(rimc);
  const coreMat = new THREE.MeshStandardMaterial({color:0x141518, roughness:0.5,
    emissive:0xff2200, emissiveIntensity:0});
  const core = new THREE.Mesh(new THREE.CylinderGeometry(0.80, 0.80, 1.06, 24), coreMat);
  core.rotation.x = Math.PI/2; core.position.set(sx, -0.1, 3.02);
  head.add(core);
  eyeCores.push(coreMat);
}
/* 發射超音波：眼睛閃紅光一下 */
let eyeGlow = 0;
function flashEyes(){ eyeGlow = 1; }
function updateEyeGlow(){
  if(eyeGlow > 0){
    eyeGlow = Math.max(0, eyeGlow - 0.045);
    for(const m of eyeCores) m.emissiveIntensity = eyeGlow * 1.6;
  }
}
/* 頭側電源孔與開關（照片右側） */
const jack = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.5, 16), M.dark);
jack.rotation.z = Math.PI/2; jack.position.set(3.5, 0.2, 0.8); head.add(jack);
box(0.5, 0.5, 0.9, M.dark, 3.5, 0.2, -0.9, head);

/* 腿與腳：hip(繞Y) → 腿 → ankle(繞Z) → 腳掌 */
const hipL = new THREE.Group(), hipR = new THREE.Group();
hipL.position.set(-1.75, 3.2, 0); hipR.position.set(1.75, 3.2, 0);
otto.add(hipL); otto.add(hipR);
const ankL = new THREE.Group(), ankR = new THREE.Group();
function buildLeg(hip, ank, side){            // side: -1 左 / +1 右
  box(2.1, 2.6, 2.3, M.white, 0, -1.3, 0, hip);              // 腿柱
  box(0.7, 1.3, 1.15, M.servo, side*1.25, -1.5, 0, hip);     // 腿側藍色伺服
  ank.position.set(0, -2.6, 0);
  hip.add(ank);
  box(1.4, 0.9, 1.6, M.white, side*0.35, -0.15, 0, ank);     // 踝架
  const foot = box(3.6, 0.6, 5.2, M.white, side*0.75, -0.75, 0.55, ank);  // 腳掌板
  box(0.28, 0.1, 0.28, M.dark, side*0.75-0.9, -0.4, 1.6, ank);            // 螺絲點綴
  box(0.28, 0.1, 0.28, M.dark, side*0.75-0.9, -0.4, -0.4, ank);
  return foot;
}
buildLeg(hipL, ankL, -1);
buildLeg(hipR, ankR, +1);
otto.position.y = 0.5;   // 站立基準：讓腳底貼齊地板（地板在 y=0，腳底約 y=0.05）

/* 障礙物（超音波用） */
const obstacle = new THREE.Group();
const wall = box(14, 9, 1.6, new THREE.MeshStandardMaterial({color:0xF5A623, roughness:0.7}), 0, 4.5, 0, obstacle);
box(14, 0.5, 1.6, M.dark, 0, 0.25, 0, obstacle);
scene.add(obstacle);

/* ---------- 2. 動作引擎 ---------- */
/* 4 顆伺服角度（度）：LL=左腿(hip yaw) RL=右腿 LF=左腳(ankle roll) RF=右腳
 * 模擬 OttoDIYLib 振盪器：angle = offset + A·sin(2π·t/T + φ)               */
const servo = {LL:0, RL:0, LF:0, RF:0};
const D2R = Math.PI/180;
let heading = 0;                    // 面向角（弧度，0 = +Z）
let simDist = 25;                   // 超音波讀值
function applyServos(){
  hipL.rotation.y =  servo.LL * D2R;
  hipR.rotation.y =  servo.RL * D2R;
  ankL.rotation.z =  servo.LF * D2R;
  ankR.rotation.z =  servo.RF * D2R;
}
function setHome(){ servo.LL=servo.RL=servo.LF=servo.RF=0; bodyG.position.y=0; bodyG.rotation.set(0,0,0); applyServos(); }
setHome();

let stopFlag = false;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* 通用振盪動作。move = {A:[LL,RL,LF,RF], O:[偏移], phi:[相位/度], T, cycles, fx} */
function oscillate(move){
  return new Promise(resolve => {
    const t0 = performance.now();
    const total = move.T * move.cycles;
    function frame(now){
      if(stopFlag){ resolve(); return; }
      const t = now - t0;
      const p = Math.min(t/total, 1);
      const w = 2*Math.PI * (t/move.T);
      servo.LL = move.O[0] + move.A[0]*Math.sin(w + move.phi[0]*D2R);
      servo.RL = move.O[1] + move.A[1]*Math.sin(w + move.phi[1]*D2R);
      servo.LF = move.O[2] + move.A[2]*Math.sin(w + move.phi[2]*D2R);
      servo.RF = move.O[3] + move.A[3]*Math.sin(w + move.phi[3]*D2R);
      applyServos();
      if(move.fx) move.fx(t, w, p);
      if(t < total) requestAnimationFrame(frame);
      else { resolve(); }
    }
    requestAnimationFrame(frame);
  });
}
function moveForward(dist){            // 沿面向方向位移
  otto.position.x += Math.sin(heading) * dist;
  otto.position.z += Math.cos(heading) * dist;
  camTarget.x = otto.position.x; camTarget.z = otto.position.z;
  if(window.MISSION){ window.MISSION.state.totalForward += Math.abs(dist); if(window.missionTrack) missionTrack(); }
  updateCamera();
}

/* 各動作定義（參數比照 OttoDIYLib：steps, T, dir…） */
const Moves = {
  home: async () => { setHome(); await sleep(250); },
  walk: (steps, T, dir) => oscillate({
    A:[28,28,18,18], O:[0,0,3,-3], phi:[0,0,dir*-90,dir*-90], T, cycles:steps,
    fx:(t)=>{ moveForward(dir * 2.4 / (T/16.7) ); }        // 每步約 2.4 單位
  }),
  turn: (steps, T, dir) => oscillate({
    A:[dir>0?32:8, dir>0?8:32, 18,18], O:[0,0,3,-3], phi:[0,0,-90,-90], T, cycles:steps,
    fx:()=>{ heading += dir * (0.14/(T/16.7)); otto.rotation.y = heading; }
  }),
  updown: (steps, T, h) => oscillate({
    A:[0,0,h,h], O:[0,0,h,-h], phi:[0,0,-90,90], T, cycles:steps,
    fx:(t,w)=>{ bodyG.position.y = Math.max(0, Math.sin(w)) * h * 0.045; }
  }),
  swing: (steps, T, h) => oscillate({
    A:[0,0,h,h], O:[0,0,h/2,-h/2], phi:[0,0,0,0], T, cycles:steps,
    fx:(t,w)=>{ bodyG.rotation.z = Math.sin(w) * h * 0.006; }
  }),
  moonwalker: (steps, T, h, dir) => oscillate({

let AC = null;
function beep(freq, ms){
  return new Promise(r => {
    if(!document.getElementById('sndChk').checked || freq<=0){ setTimeout(r, ms); return; }
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.12, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + ms/1000);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + ms/1000);
    setTimeout(r, ms + 25);
  });
}

const CONSTS = {FORWARD:1, BACKWARD:-1, LEFT:1, RIGHT:-1, SMALL:5, MEDIUM:15, BIG:30,
  true:1, false:0, HIGH:1, LOW:0, INPUT:0, OUTPUT:1, INPUT_PULLUP:2,

function stripCode(src){
  return src.replace(/\/\*[\s\S]*?\*\//g, ' ')
            .replace(/\/\/[^\n]*/g, ' ')
            .replace(/#\s*\w+[^\n]*/g, ' ');
}
function readDefines(src, env){        // #define 名稱 數值 → 當常數用
  const re = /#define\s+([A-Za-z_]\w*)\s+(-?\d+(?:\.\d+)?)/g;
  let m;
  while(m = re.exec(src)) env[m[1]] = parseFloat(m[2]);
}
/* 找出所有 void 函式（setup/loop/自訂函式），剩下的就是全域區 */
function extractFunctions(src){
  const fns = {};
  let globals = '';
  let last = 0;
  const re = /void\s+([A-Za-z_]\w*)\s*\(\s*\)\s*\{/g;
  let m;
  while(m = re.exec(src)){
    globals += src.slice(last, m.index);
    let i = m.index + m[0].length, depth = 1, start = i;
    while(i < src.length && depth > 0){
      if(src[i] === '{') depth++;
      else if(src[i] === '}') depth--;
      i++;
    }
    fns[m[1]] = src.slice(start, i-1);
    last = i;
    re.lastIndex = i;
  }
  globals += src.slice(last);
  return {fns, globals};
}
/* 全域變數宣告：int distance;  bool flag = false; */
function readGlobals(globals, env){
  for(const seg of globals.split(';')){
    const m = /^\s*(?:int|long|float|double|bool)\s+([A-Za-z_]\w*)\s*(?:=\s*(.+))?$/.exec(seg.trim());
    if(m){ try{ env[m[1]] = m[2] ? evalExpr(m[2], env) : 0; }catch(e){ env[m[1]] = 0; } }
  }
}

/* 語句解析（遞迴下降；支援 if / else if / else、for、while 任意巢狀） */
function parseBlock(s){
  const stmts = []; let i = 0;
  function ws(){ while(i<s.length && /\s/.test(s[i])) i++; }
  function kw(word){ return s.startsWith(word, i) && !/\w/.test(s[i+word.length]||''); }
  function readParen(){            // 讀取一組 ( ... )
    ws(); if(s[i] !== '(') throw '缺少 (';
    let depth = 0, start = ++i;
    for(depth=1; i<s.length && depth>0; i++){
      if(s[i]==='(') depth++; else if(s[i]===')') depth--;
    }
    return s.slice(start, i-1);
  }
  function readBlockOrStmt(){      // { 多句 } 或 單一語句（含巢狀 if/for/while）
    ws();
    if(s[i] === '{'){
      let depth = 0, start = ++i;
      for(depth=1; i<s.length && depth>0; i++){
        if(s[i]==='{') depth++; else if(s[i]==='}') depth--;
      }
      return parseBlock(s.slice(start, i-1));
    }
    return [oneStmt()];
  }
  function oneStmt(){              // 解析「一個」語句，回傳 AST 節點
    ws();
    if(kw('if')){
      i += 2;
      const cond = readParen();
      const then = readBlockOrStmt();
      ws();
      let els = null;
      if(kw('else')){ i += 4; els = readBlockOrStmt(); }   // else / else if 都交給 readBlockOrStmt 遞迴
      return {t:'if', cond, then, els};
    }
    if(kw('while')){
      i += 5;
      const cond = readParen();
      const body = readBlockOrStmt();
      return {t:'while', cond, body};
    }
    if(kw('for')){
      i += 3;
      const head = readParen();
      const body = readBlockOrStmt();
      const parts = head.split(';');
      if(parts.length !== 3) throw 'for 括號裡要有兩個分號：for(int i=0; i<3; i++)';
      return {t:'for', init:parts[0].trim(), cond:parts[1].trim(), inc:parts[2].trim(), body};
    }
    const start = i;
    while(i<s.length && s[i] !== ';') i++;
    const raw = s.slice(start, i).trim(); i++;
    return raw ? {t:'stmt', raw} : null;
  }
  while(true){
    ws(); if(i >= s.length) break;
    const st = oneStmt();
    if(st) stmts.push(st);
  }
  return stmts;
}

/* 運算式求值 */
function evalExpr(str, env){
  str = str.trim();
  let p = 0;
  function ws(){ while(p<str.length && /\s/.test(str[p])) p++; }
  function factor(){
    ws();
    if(str[p] === '('){ p++; const v = additive(); ws(); p++; return v; }
    if(str[p] === '-'){ p++; return -factor(); }
    if(str[p] === '!'){ p++; return factor() ? 0 : 1; }
    const m = /^[A-Za-z_][A-Za-z0-9_\.]*/.exec(str.slice(p));
    if(m){
      p += m[0].length; ws();
      if(str[p] === '('){                        // 函式呼叫
        let depth = 1; p++;
        while(p<str.length && depth>0){ if(str[p]==='(')depth++; if(str[p]===')')depth--; p++; }
        if(/getDistance/.test(m[0])){ flashEyes(); return readDistance(); }  // 眼睛閃紅光＝正在發射超音波
        if(/digitalRead/.test(m[0])) return 1;   // 模擬：讀腳位都回 HIGH
        if(/analogRead/.test(m[0])) return 512;
        return 0;
      }
      if(m[0] in env) return env[m[0]];
      if(m[0] in CONSTS) return CONSTS[m[0]];
      throw '不認識的名稱：' + m[0];
    }
    const n = /^\d+(\.\d+)?/.exec(str.slice(p));
    if(n){ p += n[0].length; return parseFloat(n[0]); }
    throw '看不懂的算式：' + str;
  }
  function term(){ let v = factor(); ws();
    while(str[p]==='*'||str[p]==='/'){ const op=str[p++]; const r=factor(); v = op==='*'? v*r : v/r; ws(); }
    return v; }
  function additive(){ let v = term(); ws();
    while(str[p]==='+'||(str[p]==='-'&&str[p+1]!=='-')){ const op=str[p++]; const r=term(); v = op==='+'? v+r : v-r; ws(); }
    return v; }
  function compare(){ let v = additive(); ws();
    const two = str.slice(p, p+2);
    if(two==='<='){p+=2; return v <= additive() ?1:0;}
    if(two==='>='){p+=2; return v >= additive() ?1:0;}
    if(two==='=='){p+=2; return v === additive()?1:0;}
    if(two==='!='){p+=2; return v !== additive()?1:0;}
    if(str[p]==='<'){p++; return v < additive() ?1:0;}
    if(str[p]==='>'){p++; return v > additive() ?1:0;}
    return v; }
  function logic(){ let v = compare(); ws();
    while(str.slice(p,p+2)==='&&' || str.slice(p,p+2)==='||'){
      const op = str.slice(p,p+2); p+=2; const r = compare();
      v = op==='&&' ? (v&&r?1:0) : (v||r?1:0); ws(); }
    return v; }
  return logic();
}

/* Otto 指令 → 動作＋中文紀錄 */
const CmdInfo = {
  home:[0,'🧍 立正站好'], walk:[3,'🚶 走路'], turn:[3,'↩️ 轉彎'], bend:[3,'🙇 彎腰'],
  shakeLeg:[3,'🦵 抖腿'], updown:[3,'🆙 上下運動'], swing:[3,'🕺 左右搖擺'],
  moonwalker:[4,'🌙 月球漫步'], crusaito:[4,'💃 交叉舞步'], flapping:[4,'🐦 拍翅舞'],
  tiptoeSwing:[3,'🩰 踮腳搖擺'], jitter:[3,'⚡ 顫抖'], ascendingTurn:[3,'🌀 旋轉上升'],
  jump:[2,'🦘 跳躍'],
};
async function execStmt(st, env){
  if(stopFlag) throw {stopped:true};
  if(st.t === 'if'){
    const v = evalExpr(st.cond, env);
    log(`❓ if (${st.cond.trim()}) → ${v? '成立 ✔':'不成立 ✘'}`, 'note');
    await execBlock(v ? st.then : (st.els||[]), env);
    return;
  }
  if(st.t === 'while'){
    let guard = 0;
    while(evalExpr(st.cond, env)){
      if(stopFlag) throw {stopped:true};
      if(++guard > 500) throw 'while 迴圈跑太多次（超過 500 次），先停下來檢查條件';
      await execBlock(st.body, env);
      await sleep(10);
    }
    return;
  }
  if(st.t === 'for'){
    if(st.init) runSimple(st.init, env);
    let guard = 0;
    while(!st.cond || evalExpr(st.cond, env)){
      if(stopFlag) throw {stopped:true};
      if(++guard > 500) throw 'for 迴圈跑太多次（超過 500 次），先停下來檢查條件';
      await execBlock(st.body, env);
      if(st.inc) runSimple(st.inc, env);
    }
    return;
  }
  await runSimple(st.raw, env, true);
}
async function runSimple(raw, env, allowCall){
  raw = raw.trim(); if(!raw) return;
  let m;
  if(m = /^(?:int|long|float|double|bool)\s+([A-Za-z_]\w*)\s*=\s*(.+)$/.exec(raw)){
    env[m[1]] = evalExpr(m[2], env);
    log(`📦 變數 ${m[1]} = ${env[m[1]]}`, 'sys');
    return;
  }
  if(m = /^([A-Za-z_]\w*)\s*=\s*(.+)$/.exec(raw)){ env[m[1]] = evalExpr(m[2], env); return; }
  if(m = /^([A-Za-z_]\w*)\s*\+\+$/.exec(raw)){ env[m[1]] = (env[m[1]]||0) + 1; return; }
  if(m = /^([A-Za-z_]\w*)\s*--$/.exec(raw)){ env[m[1]] = (env[m[1]]||0) - 1; return; }
  if(!allowCall) return;
  if(m = /^delay\s*\((.+)\)$/.exec(raw)){
    const ms = evalExpr(m[1], env);
    log(`⏳ 等待 ${ms} 毫秒`, 'sys');
    const t0 = Date.now();
    while(Date.now() - t0 < ms){ if(stopFlag) throw {stopped:true}; await sleep(30); }
    return;
  }
  if(m = /^Otto\s*\.\s*([A-Za-z_]\w*)\s*\((.*)\)$/.exec(raw)){
    const fn = m[1];
    const args = m[2].trim() ? splitArgs(m[2]).map(a => {
      const t = a.trim();
      if(/^S_\w+$/.test(t) || /^Otto[A-Z]\w+$/.test(t)) return t;   // 音效/手勢名
      if(/^".*"$/.test(t)) return t.slice(1,-1);
      return evalExpr(t, env);
    }) : [];
    await runOtto(fn, args);
    return;
  }
  if(/^(Serial|pinMode|digitalWrite|analogWrite|randomSeed)\b/.test(raw)) return;  // 忽略無害指令
  if(m = /^([A-Za-z_]\w*)\s*\(\s*\)$/.exec(raw)){          // 呼叫自訂函式
    if(userFns[m[1]] !== undefined){
      if(!userFnAst[m[1]]) userFnAst[m[1]] = parseBlock(userFns[m[1]]);
      log('📞 呼叫自訂函式 ' + m[1] + '()', 'sys');
      await execBlock(userFnAst[m[1]], env);
      return;
    }
  }
  throw '看不懂這一行：' + raw;
}
function splitArgs(s){
  const out = []; let depth = 0, cur = '';
  for(const ch of s){
    if(ch === ',' && depth === 0){ out.push(cur); cur = ''; continue; }
    if(ch === '(') depth++; if(ch === ')') depth--;
    cur += ch;
  }
  if(cur.trim()) out.push(cur);
  return out;
}
async function runOtto(fn, a){
  if(fn === 'init'){ log('🔌 Otto.init() 硬體就緒：伺服 2/3/4/5 · 超音波 8/9 · 蜂鳴器 13（同原廠 V9 接線）', 'sys'); return; }
  if(fn === 'home'){ log('🧍 Otto.home() 立正站好'); await Moves.home(); return; }
  if(fn === 'sing'){ log('🎵 唱歌：' + a[0]); await sing(a[0]); return; }
  if(fn === 'playGesture'){
    if(window.MISSION){ window.MISSION.state.moves.add('g:'+a[0]); window.MISSION.state.moveCalls++; }
    log('🎭 表演手勢：' + a[0]);
    await (Gestures[a[0]] || (async()=>{ await sing('S_confused'); await Moves.jitter(3,400,10); }))();
    return;
  }
  if(fn === 'getDistance'){ flashEyes(); readDistance(); return; }
  if(fn === '_tone' || fn === 'tone'){ await beep(a[0]||1000, a[1]||120); return; }
  if(Moves[fn]){
    if(window.MISSION){ window.MISSION.state.moves.add(fn); window.MISSION.state.moveCalls++; }
    const info = CmdInfo[fn] || [0, fn];
    const dir = a[2] !== undefined ? a[2] : (a[3] !== undefined ? a[3] : 1);
    let dirTxt = '';
    if(fn === 'walk') dirTxt = dir >= 0 ? '（向前）' : '（向後）';
    if(fn === 'turn') dirTxt = dir >= 0 ? '（左轉）' : '（右轉）';
    log(`${info[1]} Otto.${fn}(${a.join(', ')}) ${dirTxt}`);
    setStatus(`${info[1]}${dirTxt}`);
    await Moves[fn](...a);
    return;
  }
  log('⚠️ 這個指令模擬器還不會：Otto.' + fn + '（真機仍可用）', 'err');
}

  let setupB, loopB;
  const env = {};
  readDefines(rawSrc, env);
  try{
    const ex = extractFunctions(src);
    userFns = ex.fns; userFnAst = {};
    if(userFns.setup === undefined || userFns.loop === undefined)
      throw '找不到 void setup() 或 void loop()，Arduino 程式一定要有這兩個喔！';
    readGlobals(ex.globals, env);
    setupB = parseBlock(userFns.setup);
    loopB  = parseBlock(userFns.loop);
  }catch(e){
    log('❌ 程式讀不懂：' + e, 'err');
    log('💡 提示：把錯誤訊息貼給 AI，請它幫你修正（這就是 Loop 工程！）', 'note');
    return;
  }
  running = true; stopFlag = false;
  if(window.MISSION && window.missionRunReset) missionRunReset(rawSrc);
  setRunUI(true);
  try{
    log('🚀 開始執行！先跑 setup()（只跑一次）…', 'sys');
    await execBlock(setupB, env);
    if(loopB.length){
      log('🔁 進入 loop()（會一直重複，按 ⏹ 停止）', 'sys');
      loopNEl.style.display = 'inline-block';
      let n = 0;
      while(!stopFlag){
        n++;
        loopNEl.textContent = 'loop() 第 ' + n + ' 圈';
        await execBlock(loopB, env);
        if(window.MISSION && window.missionJudge && missionJudge()) break;
        await sleep(50);
        if(n > 9999) break;
      }
    } else {
      log('（loop() 是空的，程式跑完 setup() 就結束了）', 'sys');
    }
  }catch(e){
    if(e && e.stopped){ log('⏹ 已停止', 'sys'); }
    else {
      log('❌ 執行出錯：' + e, 'err');
      log('💡 提示：把錯誤訊息貼給 AI，請它幫你修正（這就是 Loop 工程！）', 'note');
    }
  }
  running = false; stopFlag = false;
  setRunUI(false);
  setStatus(''); loopNEl.style.display = 'none';
  log('✅ 執行結束', 'sys');
});
document.getElementById('btnStop').addEventListener('click', () => { stopFlag = true; });

      check:s=> !s.collided && s.minWallDist<=19 && s.maxTurn>0.5 && s.totalForward>=6,
      fail:'💥 撞到牆了！要先用 Otto.getDistance() 偵測，太近就別再直走。',
      win:'🏆 安全！OTTO 學會看路了，一次都沒撞牆！' }
  };
  window.MISSIONS = MISSIONS;

  const codeEl = document.getElementById('code');
  const mcard = document.getElementById('mcard');

  window.missionTrack = function(){
    const M = window.MISSION; if(!M) return; const s = M.state;
    s.distFromStart = Math.hypot(otto.position.x, otto.position.z);
    if(s.distFromStart > s.maxAway) s.maxAway = s.distFromStart;
    s.maxTurn = Math.max(s.maxTurn, Math.abs(heading));
    if(M.target){ const dt = Math.hypot(otto.position.x-M.target.x, otto.position.z-M.target.z); if(dt<s.minTargetDist) s.minTargetDist=dt; }
    if(M.fixedObstacle){ const dw = Math.hypot(otto.position.x-M.fixedObstacle.x, otto.position.z-M.fixedObstacle.z);
      s.curWallDist=dw; if(dw<s.minWallDist) s.minWallDist=dw; if(dw<5.5) s.collided=true; }
  };

  function placeWorld(){
    const M = window.MISSION; if(!M) return;
    if(M.target){ targetRing.position.set(M.target.x,0.12,M.target.z); targetRing.visible=true; }
    else targetRing.visible=false;
    if(M.fixedObstacle){ obstacle.visible=true; obstacle.position.set(M.fixedObstacle.x,0,M.fixedObstacle.z); obstacle.rotation.y=0; obstacleZ={x:M.fixedObstacle.x,z:M.fixedObstacle.z}; }
    else { obstacle.visible=false; obstacleZ=null; }
  }

  window.missionSetupWorld = function(){
    const M = window.MISSION; if(!M) return;
    stopFlag = true;
    otto.position.set(0,0.5,0); heading=0; otto.rotation.y=0; if(window.setHome) setHome();
    if(window.camTarget) camTarget.set(0,6,0);
    placeWorld();
    if(window.updateCamera) updateCamera(); if(window.readDistance) readDistance();
  };

  window.missionRunReset = function(rawSrc){
    const M = window.MISSION; if(!M) return;
    otto.position.set(0,0.5,0); heading=0; otto.rotation.y=0; if(window.setHome) setHome();
    M.state = S(); M.state.forUsed = /\bfor\s*\(/.test(rawSrc||'');
    placeWorld();
    if(window.updateCamera) updateCamera();
    renderCard('running');
  };

  window.missionJudge = function(){
    const M = window.MISSION; if(!M) return false; const s = M.state, d = M.def;
    if(d.check(s)){ stopFlag=true; const wm=(typeof d.win==='function')?d.win(s):d.win; renderCard('win',wm); try{sing('S_superHappy');}catch(e){} log('🏆 '+wm,'sys'); return true; }
    if(s.collided && d.fail){ stopFlag=true; renderCard('fail',d.fail); try{sing('S_surprise');}catch(e){} log('❌ '+d.fail,'err'); return true; }
    if(d.needFor && !s.forUsed && s.moveCalls>=3){ stopFlag=true; const m='⚡ 這一關一定要用 for 迴圈，不能一行一行貼指令喔！'; renderCard('fail',m); log('❌ '+m,'err'); return true; }
    return false;
  };

  function renderCard(status, resMsg){
    const M = window.MISSION; if(!M){ mcard.className='mcard'; mcard.innerHTML=''; return; }
    const d = M.def;
    let cls = 'mcard show' + (status==='win'?' win':status==='fail'?' fail':'');
    let res = '';
    if(status==='win') res = `<div class="res">${resMsg}　🎉 過關！可挑戰下一關</div>`;
    else if(status==='fail') res = `<div class="res">${resMsg}<br>改一改，再按 ▶ 執行！</div>`;
    else if(status==='running') res = `<div class="res">🏃 執行中…看 OTTO 表現！</div>`;
    mcard.className = cls;
    mcard.innerHTML = `<span class="mx" onclick="missionExit()">✕ 離開任務</span>`+
      `<h3>${d.name}</h3><div class="goal">${d.goal}</div>`+
      `<div class="tip">💡 ${d.tip}</div>${res}`;
  }
  window.renderMissionCard = renderCard;

  window.missionSelect = function(id){
    const def = MISSIONS[id]; if(!def) return;
    window.MISSION = { def, target:def.target||null, fixedObstacle:def.fixedObstacle||null, state:S() };
    codeEl.value = (H + def.starter).trim() + '\n';
    missionSetupWorld();
    renderCard('ready');
    log('🎯 任務開始：'+def.name+'　→ 改程式，按 ▶ 執行挑戰！','sys');
  };

  window.missionExit = function(){
    window.MISSION = null; targetRing.visible=false;
    mcard.className='mcard'; mcard.innerHTML='';
    obstacle.visible=true; if(window.placeObstacle) placeObstacle(); if(window.readDistance) readDistance();
  };

  const msel = document.getElementById('missions');
  if(msel) msel.addEventListener('change', e=>{ const v=e.target.value; e.target.selectedIndex=0; if(v) missionSelect(v); });
})();

/* 分隔線拖曳：左右調面板寬、上下調紀錄區高 */
(function splitters(){
  const panel = document.querySelector('.panel');
  const consoleEl = document.querySelector('.console');
  function drag(el, onMove){
    el.addEventListener('pointerdown', e => {
      e.preventDefault();
      el.classList.add('on');
      el.setPointerCapture(e.pointerId);
      const move = ev => onMove(ev);
      const up = () => { el.classList.remove('on');
        el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up); };
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', up);
    });
  }
  drag(document.getElementById('splitV'), ev => {
    const w = Math.min(window.innerWidth * 0.7, Math.max(280, ev.clientX));
    panel.style.width = w + 'px'; panel.style.minWidth = '0';
  });
  drag(document.getElementById('splitH'), ev => {
    const rect = panel.getBoundingClientRect();
    const h = Math.min(rect.height * 0.7, Math.max(70, rect.bottom - ev.clientY));
    consoleEl.style.height = h + 'px';
  });
})();
log('👋 歡迎！按「▶ 執行」讓 OTTO 動起來，或先從上面載入範例程式。', 'sys');
log('💡 試試 05 避障範例：執行後拉動右上角的距離滑桿，看 OTTO 怎麼反應！', 'note');

/* ---------- 主迴圈 ---------- */
function resize(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(canvas.width !== w || canvas.height !== h){
    renderer.setSize(w, h, false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
}
(function animate(){
  requestAnimationFrame(animate);
  resize();
  readDistance();
  updateEyeGlow();
  renderer.render(scene, camera);
})();
</script>
